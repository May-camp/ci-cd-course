stages:
  - test
  - build
  - infra
  - deploy

variables:
  IMAGE_NAME: mayyadanarmaung/demo-app
  IMAGE_TAG: python-app-1.0
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"

run_tests:
  stage: test
  image: python:3.9-slim-bullseye
  before_script:
    - apt-get update -y
    - apt-get install -y make
  script:
    - make test

build_image:
  stage: build
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # 1. Update the Alpine package manager inside the Docker container
    # 2. Install git so docker build can capture your commit information cleanly
    - apk update && apk add --no-cache git
    - docker login -u $REGISTRY_USER -p $REGISTRY_PASS
  script:
    # Using explicit literal strings avoids any variable formatting issues!
    - docker build -t mayyadanarmaung/demo-app:python-app-1.0 .
    - docker push mayyadanarmaung/demo-app:python-app-1.0

provision_infra:
  stage: infra
  image:
    name: hashicorp/terraform:1.5.7
    entrypoint: [""]
  services:
    - name: localstack/localstack:3.0.0
      alias: localstack
  script:
    - cd terraform
    - terraform init
    - terraform apply -auto-approve
  artifacts:
    paths:
      - terraform/terraform.tfstate
      - terraform/ec2-private-key.pem

deploy_to_ec2:
  stage: deploy
  image: 
    name: hashicorp/terraform:1.5.7
    entrypoint: [""]
  dependencies:
    - provision_infra
  script:
    - apk add --no-cache openssh-client jq
    - cd terraform
    - TARGET_IP=$(terraform output -json server_ip | jq -r '.')
    - echo "Target EC2 instance IP is ${TARGET_IP}"
    - echo "Simulating deployment target commands..."
    - echo "ssh -i ec2-private-key.pem root@${TARGET_IP} 'docker login -u $REGISTRY_USER -p $REGISTRY_PASS && docker pull mayyadanarmaung/demo-app:python-app-1.0 && docker run -d -p 80:80 mayyadanarmaung/demo-app:python-app-1.0'"
    - echo "Deployment successfully executed against infrastructure mockup!"
